<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Panel Admin Ultra</title>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#020617,#0f172a,#020617);
color:white;
margin:0;
padding:40px;
min-height:100vh;
}

h1{
text-align:center;
font-size:40px;
margin-bottom:40px;
background:linear-gradient(90deg,#60a5fa,#22d3ee);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.panel{
max-width:1100px;
margin:auto;
}

.box{
background:rgba(30,41,59,0.6);
backdrop-filter:blur(10px);
border:1px solid rgba(255,255,255,0.1);
padding:25px;
border-radius:15px;
margin-bottom:30px;
box-shadow:0 0 25px rgba(0,0,0,0.5);
transition:0.3s;
}

.box:hover{
transform:scale(1.01);
box-shadow:0 0 30px rgba(96,165,250,0.3);
}

h2{
margin-top:0;
color:#60a5fa;
}

input{
padding:12px;
border:none;
border-radius:8px;
margin-right:10px;
background:#0f172a;
color:white;
border:1px solid #334155;
}

button{
padding:12px 18px;
border:none;
background:linear-gradient(90deg,#3b82f6,#06b6d4);
color:white;
border-radius:8px;
cursor:pointer;
font-weight:bold;
transition:0.2s;
}

button:hover{
transform:scale(1.05);
box-shadow:0 0 10px #38bdf8;
}

.delete{
background:linear-gradient(90deg,#ef4444,#dc2626);
}

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
background:#020617;
border-radius:10px;
overflow:hidden;
}

thead{
background:#0f172a;
}

td,th{
padding:12px;
border-bottom:1px solid #1e293b;
text-align:left;
}

tr:hover{
background:#0f172a;
}

.status{
margin-top:10px;
color:#22c55e;
}

</style>
</head>

<body>

<h1>⚙️ PANEL ADMIN ULTRA</h1>

<div class="panel">

<div class="box">
<h2>➕ Crear Usuario</h2>

<input id="user" placeholder="usuario">
<input id="pass" placeholder="password">

<button onclick="crear()">Crear Usuario</button>

<p id="msg" class="status"></p>

</div>


<div class="box">
<h2>👥 Usuarios Registrados</h2>

<button onclick="cargar()">Actualizar</button>

<table>

<thead>
<tr>
<th>Usuario</th>
<th>Acción</th>
</tr>
</thead>

<tbody id="tabla"></tbody>

</table>

</div>


<div class="box">

<h2>🏆 Ranking Global</h2>

<button onclick="ranking()">Actualizar Ranking</button>

<table>

<thead>
<tr>
<th>Jugador</th>
<th>Puntos</th>
</tr>
</thead>

<tbody id="rank"></tbody>

</table>

</div>

</div>


<script>

async function crear(){

const user=document.getElementById("user").value
const pass=document.getElementById("pass").value

const res=await fetch("/create",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({user,pass})
})

const data=await res.json()

document.getElementById("msg").innerText=data.ok ? "✅ Usuario creado" : "❌ Error al crear"

cargar()

}



async function cargar(){

const res=await fetch("/users")

const users=await res.json()

let html=""

users.forEach(u=>{

html+=`
<tr>
<td>${u.user}</td>
<td>
<button class="delete" onclick="eliminar('${u.user}')">Eliminar Usuario</button>
</td>
</tr>
`

})

document.getElementById("tabla").innerHTML=html

}



async function eliminar(user){

if(!confirm("¿Eliminar usuario completamente?")) return

await fetch("/delete",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({user})
})

cargar()

}



async function ranking(){

const res=await fetch("/ranking")

const data=await res.json()

let html=""

data.forEach(r=>{

html+=`
<tr>
<td>${r.user}</td>
<td>${r.points}</td>
</tr>
`

})

document.getElementById("rank").innerHTML=html

}


cargar()

</script>

</body>
</html>
