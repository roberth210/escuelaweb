<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Panel Admin</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
padding:40px;
}

h1{
text-align:center;
margin-bottom:40px;
}

.panel{
max-width:900px;
margin:auto;
}

.box{
background:#1e293b;
padding:20px;
border-radius:10px;
margin-bottom:25px;
}

input{
padding:10px;
border:none;
border-radius:5px;
margin-right:10px;
}

button{
padding:10px 15px;
border:none;
background:#3b82f6;
color:white;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#2563eb;
}

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

td,th{
padding:10px;
border-bottom:1px solid #334155;
text-align:left;
}

.delete{
background:#ef4444;
}

</style>
</head>

<body>

<h1>⚙️ PANEL ADMIN</h1>

<div class="panel">

<div class="box">
<h2>Crear Usuario</h2>

<input id="user" placeholder="usuario">
<input id="pass" placeholder="password">

<button onclick="crear()">Crear</button>

<p id="msg"></p>

</div>


<div class="box">
<h2>Usuarios</h2>

<button onclick="cargar()">Actualizar</button>

<table>

<thead>
<tr>
<th>Usuario</th>
<th>Acción</th>
</tr>
</thead>

<tbody id="tabla"></tbody>

</table>

</div>


<div class="box">

<h2>🏆 Top Ranking</h2>

<button onclick="ranking()">Ver Ranking</button>

<table>

<thead>
<tr>
<th>Jugador</th>
<th>Puntos</th>
</tr>
</thead>

<tbody id="rank"></tbody>

</table>

</div>

</div>


<script>

async function crear(){

const user=document.getElementById("user").value
const pass=document.getElementById("pass").value

const res=await fetch("/create",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({user,pass})
})

const data=await res.json()

document.getElementById("msg").innerText=data.ok ? "Usuario creado" : "Error"

cargar()

}



async function cargar(){

const res=await fetch("/users")

const users=await res.json()

let html=""

users.forEach(u=>{

html+=`
<tr>
<td>${u.user}</td>
<td>
<button class="delete" onclick="eliminar('${u.user}')">Eliminar</button>
</td>
</tr>
`

})

document.getElementById("tabla").innerHTML=html

}



async function eliminar(user){

await fetch("/delete",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({user})
})

cargar()

}



async function ranking(){

const res=await fetch("/ranking")

const data=await res.json()

let html=""

data.forEach(r=>{

html+=`
<tr>
<td>${r.user}</td>
<td>${r.points}</td>
</tr>
`

})

document.getElementById("rank").innerHTML=html

}


cargar()

</script>

</body>
</html>
